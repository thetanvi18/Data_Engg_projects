version: '3.8'

# ─────────────────────────────────────────────
#  Shared Airflow config (YAML anchor)
# ─────────────────────────────────────────────
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://retail_user:retail_pass@postgres/airflow_db
    AIRFLOW__CORE__FERNET_KEY: 'sEMVmNcNVIBHFiJIh7-qAL5HTsTxoRKK60W5x6SKd6o='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # Data Warehouse connection passed to DAGs
    DW_HOST: postgres
    DW_PORT: 5432
    DW_USER: retail_user
    DW_PASSWORD: retail_pass
    DW_DB: retail_dw
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
    - ./config:/opt/airflow/config
    - ./datasets:/opt/airflow/datasets   # Olist CSV files
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - retail_network

# ─────────────────────────────────────────────
#  Services
# ─────────────────────────────────────────────
services:

  # ── PostgreSQL (Data Warehouse + Airflow metadata) ──
  postgres:
    image: postgres:15-alpine
    container_name: retail_postgres
    environment:
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_pass
      POSTGRES_DB: postgres          # default DB; init script creates airflow_db + retail_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_databases.sh:/docker-entrypoint-initdb.d/01_init_databases.sh
      - ./scripts/setup_schemas.sql:/docker-entrypoint-initdb.d/02_setup_schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - retail_network

  # ── Airflow DB init + admin user creation ──
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for postgres..."
        sleep 5
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@retaildw.com \
          --password admin123 || true
        echo "Airflow init complete."
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy

  # ── Airflow Webserver (UI at localhost:8080) ──
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ── Airflow Scheduler ──
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

# ─────────────────────────────────────────────
#  Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  postgres-data:
    name: retail_postgres_data
  airflow-logs:
    name: retail_airflow_logs

networks:
  retail_network:
    name: retail_network
    driver: bridge
